name: LongPlay Studio Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1-mesa-glx libglib2.0-0 libxkbcommon0 \
            libdbus-1-3 libfontconfig1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pyyaml>=6.0 \
            aiohttp>=3.9.0 \
            httpx>=0.25.0 \
            anthropic>=0.25.0 \
            openai>=1.12.0 \
            Pillow>=10.0.0 \
            pydub>=0.25.0 \
            soundfile>=0.12.0 \
            scipy>=1.10.0 \
            numpy>=1.24.0 \
            pedalboard>=0.8.0 \
            pyloudnorm>=0.1.0 \
            moviepy>=1.0.3 \
            opencv-python-headless>=4.8.0 \
            google-auth>=2.0.0 \
            google-auth-oauthlib>=1.0.0 \
            google-api-python-client>=2.0.0 \
            PyQt6>=6.6.0

      - name: Validate build
        run: |
          python3 -c "from modules.master.chain import MasterChain; print('Chain OK')"
          python3 -c "from modules.master.maximizer import *; print('maximizer OK')"
          python3 -c "from modules.master.equalizer import *; print('equalizer OK')"
          python3 -c "from modules.master.dynamics import *; print('dynamics OK')"
          python3 -c "from modules.master.genre_profiles import *; print('genre_profiles OK')"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
